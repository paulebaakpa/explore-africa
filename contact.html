<link rel="stylesheet" href="style.css">

<h2>Travel Inquiry Form</h2>

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="tel" name="phone" placeholder="Phone Number">

<select name="destination">
  <option value="">Select Destination</option>
  <option>Morocco</option>
  <option>Kenya</option>
  <option>Tanzania</option>
  <option>South Africa</option>
  <option>Namibia</option>
  <option>Multi-Country Tour</option>
</select>

<select name="experience">
  <option value="">Preferred Experience</option>
  <option>Safari Adventure</option>
  <option>Wildlife Expedition</option>
  <option>Cultural Tour</option>
  <option>Luxury Travel</option>
  <option>Desert Exploration</option>
  <option>Photography Tour</option>
</select>

<input type="number" name="travelers" placeholder="Number of Travelers">

<input type="date" name="travel-date">

<textarea name="message" rows="6" placeholder="Tell us about your dream African adventure..."></textarea>

<button type="submit">
  <i class="fas fa-paper-plane"></i> Send Inquiry
</button>



<section class="feature">
  <i class="fas fa-route"></i>
  <h3>Custom Itineraries</h3>
  <p>Every journey is tailored to your interests, schedule, and budget.</p>
</div>

<div class="feature">
  <i class="fas fa-binoculars"></i>
  <h3>Unique Experiences</h3>
  <p>Discover wildlife, culture, landscapes, and hidden gems across Africa.</p>
</div>

<div class="feature">
  <i class="fas fa-shield-alt"></i>
  <h3>Trusted Guidance</h3>
  <p>Travel confidently with experienced local partners and guides.</p>
</div>
</section>
